<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - DBMN</title>
    <meta name="description" content="Start your free DBMN trial">
    <link rel="icon" type="image/svg+xml" href="/images/dobermannOutline.svg">
    <link rel="icon" type="image/png" href="/images/DBMNLogo.png">
    <link rel="stylesheet" href="/css/brand.css">
    <link rel="stylesheet" href="/account/shared.css">
</head>
<body>
    <header class="site-header compact-header">
        <a href="/">
            <img src="/images/DBMNLogo.png" alt="DBMN">
            <h1>DBMN</h1>
        </a>
    </header>

    <div class="container">
        <div class="card">
            <h2>Start Your Free Trial</h2>
            <p class="step-subtitle">30 days, no credit card. We'll send you a sign-in link &mdash; no password to remember.</p>

            <div id="alert" class="alert"></div>

            <!-- Magic link form (default) -->
            <form id="magicLinkForm">
                <div class="form-group">
                    <label for="magicEmail">Email</label>
                    <input type="email" id="magicEmail" required placeholder="you@company.com" autocomplete="email">
                </div>
                <button type="submit" id="magicLinkBtn" class="btn btn-primary">Email me a sign-in link</button>
            </form>

            <div class="link-text" id="passwordToggleRow">
                <a href="#" id="usePasswordLink">Use a password instead</a>
            </div>

            <!-- Password form (revealed by toggle) -->
            <form id="passwordForm" style="display: none;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@company.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required minlength="8" placeholder="Re-enter password" autocomplete="new-password">
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary">Create account</button>
            </form>

            <div class="link-text" id="magicToggleRow" style="display: none;">
                <a href="#" id="useMagicLinkLink">Email me a sign-in link instead</a>
            </div>

            <div class="link-text">
                Already have an account? <a href="/account/login.html">Sign In</a>
            </div>
        </div>

        <footer>
            <a href="/terms.html">Terms</a> &middot; <a href="/privacy.html">Privacy</a>
            <br>
            &copy; 2026 DBMN.io
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/account/shared.js"></script>
    <script>
        // Build the emailRedirectTo URL, preserving ?redirect=vscode if present
        function buildRedirectUrl() {
            var base = 'https://dbmn.io/account/auth-callback.html';
            return isVSCodeRedirect() ? (base + '?redirect=vscode') : base;
        }

        // Toggle between magic link and password forms
        function showMagicLinkForm() {
            document.getElementById('magicLinkForm').style.display = '';
            document.getElementById('passwordToggleRow').style.display = '';
            document.getElementById('passwordForm').style.display = 'none';
            document.getElementById('magicToggleRow').style.display = 'none';
            hideAlert('alert');
        }

        function showPasswordForm() {
            document.getElementById('magicLinkForm').style.display = 'none';
            document.getElementById('passwordToggleRow').style.display = 'none';
            document.getElementById('passwordForm').style.display = '';
            document.getElementById('magicToggleRow').style.display = '';
            hideAlert('alert');
        }

        // Post-signup side effects: trial license + welcome email notification.
        // Best-effort — failures are logged but not surfaced (registration succeeds either way).
        async function createTrialAndNotify(user, email) {
            if (!user) return;

            try {
                var now = new Date();
                var trialEnd = new Date(now);
                trialEnd.setDate(trialEnd.getDate() + 30);
                await dbmnSupabase
                    .from('user_licenses')
                    .insert({
                        user_id: user.id,
                        license_type: 'trial',
                        status: 'active',
                        trial_started_at: now.toISOString(),
                        trial_ends_at: trialEnd.toISOString()
                    });
            } catch (err) {
                console.warn('License creation warning:', err);
            }

            try {
                await callEdgeFunction('send-welcome-email', { email: email });
            } catch (emailErr) {
                console.warn('Welcome email notification failed:', emailErr);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSupabase();

            document.getElementById('usePasswordLink').addEventListener('click', function(e) {
                e.preventDefault();
                showPasswordForm();
            });

            document.getElementById('useMagicLinkLink').addEventListener('click', function(e) {
                e.preventDefault();
                showMagicLinkForm();
            });

            // ── Magic link signup ──
            document.getElementById('magicLinkForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                hideAlert('alert');

                var email = document.getElementById('magicEmail').value.trim();
                if (!email) {
                    showAlert('alert', 'Please enter your email.', 'error');
                    return;
                }

                setButtonLoading('magicLinkBtn', true, 'Sending link...');

                try {
                    var result = await dbmnSupabase.auth.signInWithOtp({
                        email: email,
                        options: {
                            shouldCreateUser: true,
                            emailRedirectTo: buildRedirectUrl()
                        }
                    });

                    if (result.error) {
                        showAlert('alert', result.error.message, 'error');
                        setButtonLoading('magicLinkBtn', false);
                        return;
                    }

                    document.getElementById('magicLinkForm').style.display = 'none';
                    document.getElementById('passwordToggleRow').style.display = 'none';
                    showAlert(
                        'alert',
                        'Check your inbox — we sent a sign-in link to ' + email + '. Click it to start your 30-day trial.',
                        'success'
                    );
                } catch (err) {
                    showAlert('alert', 'Could not send sign-in link: ' + err.message, 'error');
                    setButtonLoading('magicLinkBtn', false);
                }
            });

            // ── Password signup ──
            document.getElementById('passwordForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                hideAlert('alert');

                var email = document.getElementById('email').value.trim();
                var password = document.getElementById('password').value;
                var confirmPassword = document.getElementById('confirmPassword').value;

                if (password !== confirmPassword) {
                    showAlert('alert', 'Passwords do not match.', 'error');
                    return;
                }

                if (password.length < 8) {
                    showAlert('alert', 'Password must be at least 8 characters.', 'error');
                    return;
                }

                setButtonLoading('submitBtn', true, 'Creating account...');

                try {
                    var signUpResult = await dbmnSupabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            emailRedirectTo: buildRedirectUrl()
                        }
                    });

                    if (signUpResult.error) {
                        showAlert('alert', signUpResult.error.message, 'error');
                        setButtonLoading('submitBtn', false);
                        return;
                    }

                    var user = signUpResult.data.user;
                    await createTrialAndNotify(user, email);

                    // Email confirmation required (no session yet) — show inbox prompt
                    if (user && !signUpResult.data.session) {
                        document.getElementById('passwordForm').style.display = 'none';
                        document.getElementById('magicToggleRow').style.display = 'none';
                        showAlert(
                            'alert',
                            'We sent a confirmation link to ' + email + '. Click it to activate your account and start your 30-day trial.',
                            'success'
                        );
                        return;
                    }

                    // Auto-confirmed signup — redirect appropriately
                    if (isVSCodeRedirect()) {
                        var session = await getCurrentSession();
                        if (session) {
                            showAlert('alert', 'Account created! Redirecting to VS Code...', 'success');
                            setTimeout(function() { redirectToVSCode(session); }, 1000);
                        } else {
                            window.location.href = '/account/login.html?redirect=vscode';
                        }
                    } else {
                        window.location.href = '/account/index.html';
                    }
                } catch (err) {
                    showAlert('alert', 'Registration failed: ' + err.message, 'error');
                    setButtonLoading('submitBtn', false);
                }
            });
        });
    </script>
</body>
</html>
