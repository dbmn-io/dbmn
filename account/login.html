<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DBMN</title>
    <meta name="description" content="Sign in to your DBMN account">
    <link rel="icon" type="image/png" href="/images/DBMNLogo.png">
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/images/DBMNLogo.png" alt="DBMN">
            <h1>DBMN</h1>
        </div>

        <div class="card">
            <h2>Sign In</h2>

            <div id="alert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@company.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Your password" autocomplete="current-password">
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary">Sign In</button>
            </form>

            <div class="link-text">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initSupabase();

            var form = document.getElementById('loginForm');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideAlert('alert');

                var email = document.getElementById('email').value.trim();
                var password = document.getElementById('password').value;

                setButtonLoading('submitBtn', true, 'Signing in...');

                try {
                    var result = await dbmnSupabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (result.error) {
                        showAlert('alert', result.error.message, 'error');
                        setButtonLoading('submitBtn', false);
                        return;
                    }

                    // If redirect=vscode, send tokens back to VS Code extension
                    if (isVSCodeRedirect()) {
                        showAlert('alert', 'Redirecting to VS Code...', 'success');
                        redirectToVSCode(result.data.session);
                        return;
                    }

                    // Otherwise go to account dashboard
                    window.location.href = 'index.html';

                } catch (err) {
                    showAlert('alert', 'Sign-in failed: ' + err.message, 'error');
                    setButtonLoading('submitBtn', false);
                }
            });
        });
    </script>
</body>
</html>
